Wild Commander v1.1[SETUP]CPU_FREQ=2; 0=3.5MHz, 1=7MHz, 2=14MHz, 3=reservedSavePaths=1; 0-disabled, 1-enabled (remember dirs in panels)SavePosition=1; 0-disabled, 1-enabled (restores cursor position, if enabled)TextMode=2; 0=80x25, 1=80x30, 2=90x36 text modeLogo=1; 0-disabled, 1-enabled (disables logo header and clock)ScreenSaver=9; 0-disabled, 1-9 minutes[PLUGINS]MOUNTER.WMF -memory=128 -cpu=3,5 -cache=off -rs232=115200SETIME.WMF; memory:128/512/1024/auto cpu:3,5/7/14 cache:on/off rs232:115200/230400RE.WMFVGMPLAY.WMFTXTEDIT.WMF -highlight=auto; auto,on,offFILE_CR.WMFTRDisp.wmfTRDUMP.WMFROM_PROG.WMFWPLAYER.WMFGSPLAYER.WMF -midi_chip=2; 1 - first (#FF), 2 - second (#FE)VIDEO_PL.WMFBMPV.WMFILBMVIEW.WMFFTVIEW.WMFGIFVIEW.WMFMCGSV.WMFTAPM.WMF -loading=real -cpu=3,5 -memory=128 -basic=48COMPILER.WMF; loading:real/slow/fast cpu:3,5/7/14 memory:128/512/1024/auto basic:48/128CLOCK.WMF;PLASMATW.WMF;SCRSAVER.WMF[LPANEL]DRV=1; 0-IDEnemoMaster, 1-SD1zc, 2-SDngs, 3-IDEsmucMaster, 4-IDEsmucSlave, 5-IDEnemoSlave, 6-SD2zcINFO=0; file info (0 - disabled, 1 - enabled)CSORT=2; sorting (0 - off, 1 - by name, 2 - by ext, 3 - by size)[RPANEL]DRV=1; 0-IDEnemoMaster, 1-SD1zc, 2-SDngs, 3-IDEsmucMaster, 4-IDEsmucSlave, 5-IDEnemoSlave, 6-SD2zcINFO=0; file info (0 - disabled, 1 - enabled)CSORT=2; sorting (0 - off, 1 - by name, 2 - by ext, 3 - by size);this file and all plug-ins must be placed into WC folder (in root dir of Boot-Device);данный файл и все плагины нужно разместить в папке WC;(в корне загрузочного устройства, которое выбирается в ts-bios'e [SS+F12])